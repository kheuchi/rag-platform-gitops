apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats-helm
  namespace: argocd
spec:
  project: rag-platform
  source:
    repoURL: https://nats-io.github.io/k8s/helm/charts/
    chart: nats
    targetRevision: 1.2.6
    helm:
      values: |
        config:
          jetstream:
            enabled: true
            fileStore:
              pvc:
                size: 1Gi
                storageClassName: managed-csi
          monitor:
            enabled: true
            port: 8222
          cluster:
            enabled: false
        container:
          merge:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
        # Expose monitoring port so KEDA nats-jetstream scaler can reach it
        service:
          merge:
            spec:
              ports:
                - name: monitor
                  port: 8222
                  targetPort: 8222
        reloader:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: nats
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
