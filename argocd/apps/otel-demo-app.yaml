apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-demo
  namespace: argocd
spec:
  project: rag-platform
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-demo
    targetRevision: 0.32.8
    helm:
      values: |
        # --- Observability backends ---
        # Grafana stack: Prometheus + OpenSearch + Jaeger + Grafana
        grafana:
          enabled: true
        prometheus:
          enabled: true
        jaeger:
          enabled: true
        opensearch:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 100Mi
            limits:
              memory: 1Gi

        # --- OTel Collector (receives traces/metrics/logs from demo services) ---
        opentelemetry-collector:
          enabled: true
          mode: daemonset
          presets:
            logsCollection:
              enabled: true
              includeCollectorLogs: false
          config:
            exporters:
              opensearch:
                http:
                  endpoint: http://otel-demo-opensearch:9200
                  tls:
                    insecure: true

        # --- Demo services: disable most to save resources (D2s_v3 = 2 vCPU) ---
        # Keep only: flagd, frontend, frontendProxy, cartService, productCatalogService, otelcol
        # These generate enough traces/metrics/logs for RCA agent demos
        components:
          flagd:
            enabled: true
          frontendProxy:
            enabled: true
          frontend:
            enabled: true
          cartService:
            enabled: true
          productCatalogService:
            enabled: true
          # Disabled to save resources
          accountingService:
            enabled: false
          frauddetectionService:
            enabled: false
          kafka:
            enabled: false
          checkoutService:
            enabled: false
          imageprovider:
            enabled: false
          adService:
            enabled: false
          emailService:
            enabled: false
          paymentService:
            enabled: false
          quoteService:
            enabled: false
          recommendationService:
            enabled: false
          shippingService:
            enabled: false
          currencyService:
            enabled: false
          loadgenerator:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: otel-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true



