apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: rag-platform
  namespace: argocd
spec:
  description: RAG Platform — all environments
  sourceRepos:
    - "https://github.com/kheuchi/*"
    - "https://charts.crossplane.io/stable"
  destinations:
    # Allow any namespace created by ApplicationSet (tenants/*)
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
