apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-worker
  namespace: rag-dev
  labels:
    app: rag-worker
    component: worker
spec:
  replicas: 0
  selector:
    matchLabels:
      app: rag-worker
  template:
    metadata:
      labels:
        app: rag-worker
        component: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/kheuchi/rag-worker:latest
          env:
            # --- NATS ---
            - name: NATS_URL
              value: nats://nats-helm.nats.svc.cluster.local:4222
            - name: NATS_SUBJECT
              value: rag.ingest
            # --- Azure OpenAI (embeddings) ---
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: rag-ai-secrets
                  key: azure-openai-endpoint
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-ai-secrets
                  key: azure-openai-api-key
            - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
              value: text-embedding-3-small
            # --- GCP (Firestore + Vertex AI fallback) ---
            - name: GCP_PROJECT_ID
              value: mon-rag-perso-2026
            - name: GCP_LOCATION
              value: us-central1
            - name: FIRESTORE_DATABASE
              value: "(default)"
            - name: FIRESTORE_COLLECTION
              value: code-chunks
            # --- Redis (Crossplane-provisioned Azure Cache) ---
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: redis-rag-dev-conn
                  key: attribute.hostname
                  optional: true
            - name: REDIS_KEY
              valueFrom:
                secretKeyRef:
                  name: redis-rag-dev-conn
                  key: attribute.primary_access_key
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
