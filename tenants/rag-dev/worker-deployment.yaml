apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-worker
  namespace: rag-dev
  labels:
    app: rag-worker
    component: worker
spec:
  replicas: 0
  selector:
    matchLabels:
      app: rag-worker
  template:
    metadata:
      labels:
        app: rag-worker
        component: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/kheuchi/rag-worker:latest
          env:
            - name: NATS_URL
              value: nats://nats.nats.svc.cluster.local:4222
            - name: NATS_SUBJECT
              value: rag.ingest
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: rag-backend-secrets
                  key: redis-host
                  optional: true
            - name: REDIS_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-backend-secrets
                  key: redis-key
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      tolerations:
        - key: kubernetes.azure.com/scalesetpriority
          operator: Equal
          value: spot
          effect: NoSchedule
