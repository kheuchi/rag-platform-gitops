apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-backend
  namespace: rag-dev
  labels:
    app: rag-backend
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-backend
  template:
    metadata:
      labels:
        app: rag-backend
        component: api
    spec:
      containers:
        - name: backend
          image: ghcr.io/kheuchi/rag-backend:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: NATS_URL
              value: nats://nats-helm.nats.svc.cluster.local:4222
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: rag-backend-secrets
                  key: redis-host
                  optional: true
            - name: REDIS_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-backend-secrets
                  key: redis-key
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rag-backend
  namespace: rag-dev
spec:
  selector:
    app: rag-backend
  ports:
    - port: 80
      targetPort: http
      name: http
