apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-backend
  namespace: rag-dev
  labels:
    app: rag-backend
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-backend
  template:
    metadata:
      labels:
        app: rag-backend
        component: api
    spec:
      containers:
        - name: backend
          image: ghcr.io/kheuchi/rag-backend:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            # --- NATS ---
            - name: NATS_URL
              value: nats://nats-helm.nats.svc.cluster.local:4222
            # --- Azure OpenAI ---
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: rag-ai-secrets
                  key: azure-openai-endpoint
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-ai-secrets
                  key: azure-openai-api-key
            - name: AZURE_OPENAI_CHAT_DEPLOYMENT
              value: gpt-4o
            - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
              value: text-embedding-3-small
            # --- GCP Firestore (vector search) ---
            - name: GCP_PROJECT_ID
              value: mon-rag-perso-2026
            - name: FIRESTORE_DATABASE
              value: "(default)"
            - name: FIRESTORE_COLLECTION
              value: code-chunks
            # --- GCP Vertex AI (LLM fallback) ---
            - name: GCP_LOCATION
              value: us-central1
            # --- Observability (OTel Demo stack) ---
            - name: OPENSEARCH_URL
              value: http://otel-demo-opensearch.otel-demo.svc.cluster.local:9200
            - name: PROMETHEUS_URL
              value: http://otel-demo-prometheus-server.otel-demo.svc.cluster.local:9090
            - name: JAEGER_URL
              value: http://otel-demo-jaeger-query.otel-demo.svc.cluster.local:16686
            # --- Langfuse (LLM observability) ---
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: public-key
                  optional: true
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: secret-key
                  optional: true
            - name: LANGFUSE_HOST
              value: http://langfuse.rag-dev.svc.cluster.local:3000
            # --- Redis (Crossplane-provisioned Azure Cache) ---
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: redis-rag-dev-conn
                  key: attribute.hostname
                  optional: true
            - name: REDIS_KEY
              valueFrom:
                secretKeyRef:
                  name: redis-rag-dev-conn
                  key: attribute.primary_access_key
                  optional: true
            # --- GCP credentials (service account key) ---
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/gcp/key.json
          volumeMounts:
            - name: gcp-creds
              mountPath: /var/secrets/gcp
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: gcp-creds
          secret:
            secretName: gcp-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: rag-backend
  namespace: rag-dev
spec:
  selector:
    app: rag-backend
  ports:
    - port: 80
      targetPort: http
      name: http

