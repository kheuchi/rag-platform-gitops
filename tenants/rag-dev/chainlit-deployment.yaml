apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-chainlit
  namespace: rag-dev
  labels:
    app: rag-chainlit
    component: ui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rag-chainlit
  template:
    metadata:
      labels:
        app: rag-chainlit
        component: ui
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: chainlit
          image: ghcr.io/kheuchi/rag-chainlit:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: rag-ai-secrets
                  key: azure-openai-endpoint
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-ai-secrets
                  key: azure-openai-api-key
            - name: AZURE_OPENAI_CHAT_DEPLOYMENT
              value: gpt-4o
            - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
              value: text-embedding-3-small
            - name: LLM_PROVIDER_STRATEGY
              value: switch
            - name: LLM_SWITCH_PROVIDER
              value: azure
            - name: EMBEDDING_PROVIDER_STRATEGY
              value: switch
            - name: EMBEDDING_SWITCH_PROVIDER
              value: azure
            - name: GCP_PROJECT_ID
              value: mon-rag-perso-2026
            - name: GCP_LOCATION
              value: us-central1
            - name: FIRESTORE_DATABASE
              value: "(default)"
            - name: FIRESTORE_COLLECTION
              value: code-chunks
            - name: OPENSEARCH_URL
              value: http://otel-demo-opensearch.otel-demo.svc.cluster.local:9200
            - name: PROMETHEUS_URL
              value: http://otel-demo-prometheus-server.otel-demo.svc.cluster.local:9090
            - name: JAEGER_URL
              value: http://otel-demo-jaeger-query.otel-demo.svc.cluster.local:16686
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: public-key
                  optional: true
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: secret-key
                  optional: true
            - name: LANGFUSE_BASE_URL
              value: http://langfuse-web.rag-dev.svc.cluster.local:3000
            - name: CHAINLIT_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: chainlit-auth-secrets
                  key: auth-secret
            - name: CHAINLIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: chainlit-auth-secrets
                  key: username
            - name: CHAINLIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chainlit-auth-secrets
                  key: password
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/gcp/key.json
          volumeMounts:
            - name: gcp-creds
              mountPath: /var/secrets/gcp
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: gcp-creds
          secret:
            secretName: gcp-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: rag-chainlit
  namespace: rag-dev
spec:
  selector:
    app: rag-chainlit
  ports:
    - port: 8000
      targetPort: http
      name: http

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-chainlit
  namespace: rag-dev
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-chainlit
                port:
                  number: 8000
