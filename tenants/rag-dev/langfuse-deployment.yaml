# Langfuse — self-hosted LLM observability (Phase 5)
# Lightweight single-container deployment for dev (SQLite storage).
# Production: use PostgreSQL + external Langfuse Cloud.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: rag-dev
  labels:
    app: langfuse
    component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse
  template:
    metadata:
      labels:
        app: langfuse
        component: observability
    spec:
      containers:
        - name: langfuse
          image: langfuse/langfuse:2
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATABASE_URL
              value: "file:/data/langfuse.db"
            - name: NEXTAUTH_URL
              value: "http://langfuse.rag-dev.svc.cluster.local:3000"
            - name: NEXTAUTH_SECRET
              value: "dev-secret-change-in-prod"
            - name: SALT
              value: "dev-salt-change-in-prod"
            - name: TELEMETRY_ENABLED
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse
  namespace: rag-dev
spec:
  selector:
    app: langfuse
  ports:
    - port: 3000
      targetPort: http
      name: http
